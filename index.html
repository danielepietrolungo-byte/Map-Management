<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Territori</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('Service Worker registrato con successo!', reg))
        .catch(err => console.log('Errore registrazione Service Worker:', err));
    });
  }
</script>
</head>
<body>

    <div id="login-overlay" style="display: block; position: fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:9999; text-align:center; padding-top:100px;">
        <div class="login-box">
            <h2>Accesso Riservato</h2>
            <p>Inserisci la password per consultare i territori:</p>
            <input type="password" id="passwordInput" placeholder="Password">
            <button onclick="controllaPassword()">Entra</button>
            <p id="errore" style="color: red; display: none;">Password errata o errore di connessione!</p>
        </div>
    </div>

    <header>
        <h1>Gestione Territori Roccamorice</h1>
        <div id="refresh-status" style="font-size: 10px; color: #aaa; margin-top: 5px;">Accesso richiesto</div>
    </header>

    <div id="controls-section" style="display: none; position: sticky; top: 0; z-index: 1000; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); padding: 10px 0;">
        <main class="container" style="margin-top: 0; margin-bottom: 0;">
            <section class="search-section" style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; border: none;">
                <input type="text" id="searchInput" placeholder="Cerca un territorio..." oninput="cercaMappa(event)" onfocus="resetCampo()" style="flex: 1; min-width: 200px;">
                <button onclick="cercaMappa()">Cerca</button>
                <button onclick="caricaDatiDaSheet()" title="Aggiorna ora" style="background-color: #6c757d; color: white;">🔄</button>
            </section>

            <section class="filter-buttons" style="margin-bottom: 10px;">
                <select id="selectTerritorio" onchange="filtraDaTendina(event)" style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
                    <option value="">Tutti i territori</option>
                    <option value="Bolognano">Bolognano</option>
                    <option value="Musellaro">Musellaro</option>
                    <option value="Tocco">Tocco Da Casauria</option>
                    <option value="Piano">Piano D'Orta</option>
                    <option value="Roccamorice">Roccamorice</option>
                    <option value="San Valentino">San Valentino</option>
                    <option value="Abbateggio">Abbateggio</option>
                    <option value="Caramanico">Caramanico</option>
                    <option value="Eufemia">Sant'Eufemia</option>
                    <option value="Popoli">Popoli</option>
                    <option value="Vittorito">Vittorito</option>
                    <option value="Gagliano">Gagliano</option>
                    <option value="Secinaro">Secinaro</option>
                </select>
            </section>

            <section class="filter-buttons" style="border-top: 1px solid #eee; padding-top: 10px;">
                <button onclick="filtraStato(event, 'tutti')" class="status-btn active">Mostra Tutti</button>
                <button onclick="filtraStato(event, 'disponibile')" class="status-btn">Solo Disponibili</button>
                <button onclick="filtraStato(event, 'occupato')" class="status-btn">Solo Assegnati</button>
                <button onclick="filtraStato(event, 'ritardo')" class="status-btn" style="border: 1px solid #e74c3c; color: #e74c3c;">⚠️ In Ritardo</button>
            </section>
        </main>
    </div>

    <main class="container" style="margin-top: 20px;">
        <section id="map-results" class="results-grid"></section>
    </main>

<script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbwd_hKE9r-x1i6KvEs5E5NeIAs9eYUnRJE5pGz6zVf73WX5xESubZw0-jQ7S8M8UNbekQ/exec";
    let databaseMappe = []; 
    let filtroStatoAttuale = 'tutti';
    let autoRefreshInterval;

    window.onload = function() {
        if (localStorage.getItem("accessoTerritori") === "ok" && localStorage.getItem("pwdTerritori")) {
            mostraContenuti();
            avviaApp();
        }
    };

    function mostraContenuti() {
        document.getElementById("login-overlay").style.display = "none";
        document.getElementById("controls-section").style.display = "block";
    }

    async function controllaPassword() {
        const inputPwd = document.getElementById("passwordInput").value;
        const erroreEl = document.getElementById("errore");
        try {
            erroreEl.style.display = "none";
            const response = await fetch(URL_SCRIPT, { method: "POST", body: JSON.stringify({ action: "login", password: inputPwd }) });
            const risultato = await response.json();
            if (risultato.success) {
                localStorage.setItem("accessoTerritori", "ok");
                localStorage.setItem("pwdTerritori", inputPwd);
                mostraContenuti();
                avviaApp();
            } else {
                erroreEl.innerText = "Password errata!";
                erroreEl.style.display = "block";
            }
        } catch (error) {
            erroreEl.innerText = "Errore di connessione.";
            erroreEl.style.display = "block";
        }
    }

    function avviaApp() {
        caricaDatiDaSheet();
        if (autoRefreshInterval) clearInterval(autoRefreshInterval);
        autoRefreshInterval = setInterval(caricaDatiDaSheet, 300000); 
    }

    async function caricaDatiDaSheet() {
        const statusEl = document.getElementById("refresh-status");
        try {
            const response = await fetch(URL_SCRIPT);
            databaseMappe = await response.json();
            cercaMappa(); 
            if(statusEl) statusEl.innerText = "Ultimo aggiornamento: " + new Date().toLocaleTimeString();
        } catch (error) {
            if(statusEl) statusEl.innerText = "Errore di connessione.";
        }
    }

    function filtraDaTendina(e) {
        document.getElementById("searchInput").value = e.target.value;
        cercaMappa();
    }

    function filtraStato(e, stato) {
        filtroStatoAttuale = stato;
        document.querySelectorAll('.status-btn').forEach(btn => btn.classList.remove('active'));
        if (e && e.currentTarget) e.currentTarget.classList.add('active');
        cercaMappa();
    }

    function resetCampo() { document.getElementById("searchInput").value = ""; }

    function formattaDataItaliana(stringaData) {
        if (!stringaData) return "";
        let dataPulita = stringaData.toString().trim().split(" ")[0].split("T")[0];
        if (dataPulita.includes("-")) {
            let p = dataPulita.split("-");
            return `${p[2]}/${p[1]}/${p[0]}`;
        }
        return dataPulita;
    }

    function cercaMappa() {
        const input = document.getElementById("searchInput").value.toLowerCase().trim();
        const contenitore = document.getElementById("map-results");
        contenitore.innerHTML = "";

        const risultati = databaseMappe.filter(m => {
            const matchTesto = m.nome ? m.nome.toLowerCase().includes(input) : false;
            const isLibero = ["sì", "si", "true"].includes((m.disponibile || "").toString().toLowerCase());
            const isRitardo = ["sì", "si", "true"].includes((m["in ritardo"] || m["inritardo"] || "").toString().toLowerCase());
            
            let matchStato = true;
            if (filtroStatoAttuale === 'disponibile') matchStato = isLibero;
            if (filtroStatoAttuale === 'occupato') matchStato = !isLibero;
            if (filtroStatoAttuale === 'ritardo') matchStato = isRitardo;
            return matchTesto && matchStato;
        });

        risultati.forEach(mappa => {
            let urlAnteprima = mappa.url;
            const match = mappa.url ? mappa.url.match(/\/d\/([^\/]+)/) : null;
            if (match) urlAnteprima = `https://lh3.googleusercontent.com/d/${match[1]}=w800`;

            const isLibero = ["sì", "si", "true"].includes((mappa.disponibile || "").toString().toLowerCase());
            
            const div = document.createElement("div");
            div.className = "card";
            div.innerHTML = `
                <div style="position: relative; overflow: hidden; cursor: pointer;" onclick="window.open('${mappa.url}', '_blank')">
                    <img src="${urlAnteprima}" style="width:100%; display:block;" onerror="this.src='https://via.placeholder.com/300x200?text=Territorio'">
                    <span style="position: absolute; top: 10px; right: 10px; background: ${isLibero ? "#2ecc71" : "#e74c3c"}; color: white; padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: bold;">
                        ${isLibero ? "Disponibile" : "Assegnato"}
                    </span>
                </div>
                <div class="card-body">
                    <h3>${mappa.nome}</h3>
                    <p><strong>${isLibero ? "Restituito il:" : "Assegnato il:"}</strong> ${formattaDataItaliana(isLibero ? mappa["restituito il"] : mappa["assegnato il"])}</p>
                    <input type="text" id="input-assegnato-${mappa.riga}" value="${mappa.assegnato || ''}">
                    <button onclick="salvaAssegnazione(${mappa.riga})">Salva</button>
                </div>
            `;
            contenitore.appendChild(div);
        });
    }

    async function salvaAssegnazione(riga) {
        const nuovoAssegnato = document.getElementById(`input-assegnato-${riga}`).value;
        const password = localStorage.getItem("pwdTerritori");
        const response = await fetch(URL_SCRIPT, { method: "POST", body: JSON.stringify({ action: "salva", password, riga, assegnato: nuovoAssegnato }) });
        const res = await response.json();
        if(res.success) { alert("Salvato!"); caricaDatiDaSheet(); } else { alert("Errore"); }
    }
</script>
</body>
</html>
